spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hospital_escort?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

    servlet:
      multipart:
        enabled: true
        max-file-size: 15MB
        max-request-size: 15MB

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000

  # Jackson日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# 微信小程序配置
wx:
  miniapp:
    appid: wx2cdf04957c7a931b
    secret: 46cb61e5ec49b5153797852a205b589d

# JWT配置
jwt:
  secret: hospital-escort-system-secret-key-2024
  expiration: 604800000

# 服务器配置（允许局域网访问）
server:
  address: 0.0.0.0
