<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 社区安心陪诊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
            'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            width: 450px;
            max-width: 90%;
        }

        .login-title {
            font-size: 32px;
            font-weight: bold;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 48px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 15px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .tips {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1 class="login-title">管理员登录</h1>
    <form id="loginForm">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="login-btn">登录</button>
    </form>
    <div class="tips">默认账号：admin / admin123</div>
</div>

<script>
    const API_BASE = 'http://192.168.10.105:8081/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.code === 200) {
                // 保存token
                localStorage.setItem('admin_token', result.data.token);
                localStorage.setItem('admin_info', JSON.stringify(result.data));

                alert('登录成功');
                window.location.href = 'dashboard.html';
            } else {
                alert(result.message || '登录失败');
            }
        } catch (error) {
            console.error('登录错误：', error);
            alert('网络错误，请重试');
        }
    });
</script>
</body>
</html>
